project:
  type: book
  output-dir: _output
  resources:
    - chapters/Enhanced_EV_Map.html

book:
  title: "EV Charging Infrastructure Optimization"
  subtitle: "A Data-Driven Approach using XGBoost and MCDM"
  author: "Arpit Makkar, Sarvagya Sharma, Abhinav Jain, Shashwat Shukla"
  date: "December 10, 2025"
  reader-mode: true
  page-footer:
    left: |
      Makkar, Sharma, Jain, & Shukla (2025).
    right: |
      This book template was built with <a href="https://quarto.org/">Quarto</a>, Courtesy Dr. Sukhjit Singh.
  
  site-url: https://SabudhFoundation.github.io/batch-15-ev_infratructre_planning/
  repo-branch: main
  
  chapters:
    - index.qmd
    - chapters/preface.qmd
    - chapters/abstract.qmd
    - chapters/intro.qmd
    - chapters/eda.qmd
    - chapters/methodology.qmd
    - chapters/results.qmd
    - chapters/conclusion.qmd
    - chapters/references.qmd

bibliography: references.bib
nocite: |
  @*

format:
  # ── 1. Multi-page HTML book ──────────────────────────────
  html:
    theme: united
    css: styles.css
    code-line-numbers: true
    code-link: true
    self-contained: true
    toc: true
    number-sections: true
    # Meta tag for search engines/browsers
    author-meta: "Arpit Makkar, Sarvagya Sharma, Abhinav Jain, Shashwat Shukla"

  # ── 2. PDF (Sabudh Template Settings) ────────────────────
  titlepage-pdf:
    documentclass: book
    classoption: ["oneside", "open=any"]
    number-sections: true
    toc: true
    lof: true
    lot: true
    titlepage: "bg-image"
    titlepage-bg-image: "img/corner-logo.png"
    titlepage-logo: "img/sabudh.png"
    titlepage-header: "Sabudh Foundation"
    titlepage-footer: |
      Arpit Makkar\
      Sarvagya Sharma\
      Abhinav Jain\
      Shashwat Shukla
    coverpage: "great-wave"
    coverpage-bg-image: "_extensions/nmfs-opensci/titlepage/images/TheGreatWaveoffKanagawa.jpeg"
    coverpage-title: "Sabudh Passion Project"
    coverpage-footer: "Learn and Give Back to Society"
    coverpage-theme:
      page-html-color: "F6D5A8"
      title-fontfamily: "QTDublinIrish.otf"
      title-fontsize: 40
      title-align: "right"
      title-bottom: "10in"
      header-style: "none"
      author-style: "none"
      footer-fontsize: 20
      footer-fontfamily: "QTDublinIrish.otf"
      footer-align: "right"
      footer-bottom: "9.5in"
      date-style: "none"
      bg-image-fading: "north"
    keep-tex: false
    include-in-header:
      text: |
        \usepackage{babel}  

  # ── 3. EPUB ──────────────────────────────────────────────
  epub:
    cover-image: img/coverpage.png
    toc: true
    embed-resources: true
